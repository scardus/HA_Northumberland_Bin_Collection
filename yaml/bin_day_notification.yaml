###
# Example automation: bin day reminder with Frigate bin detection
#
# Triggers at 7pm, 8pm and 9pm the night before, and again at 7:30am on collection day.
# Checks a Frigate object classification sensor to see whether a bin is visible.
# If no bin is detected, sends a push notification and sets a boolean helper.
# The helper can be used in a second automation to send a "found it!" message
# when Frigate later detects a bin.
#
# BEFORE USING:
#   Replace every occurrence of the placeholder values below with your real ones:
#     - calendar.bin_collection_your_address  → your actual calendar entity ID
#         (find it at Settings → Entities and search for "bin collection")
#     - sensor.doorbell_camera_bin_day_classification → your Frigate classification sensor
#     - input_boolean.looking_for_bin         → your boolean helper entity
#     - notify.mobile_app_your_phone_here     → your mobile app notify service
###

alias: Bin day notification
description: ""
triggers:
  - trigger: calendar.event_started
    target:
      entity_id: calendar.bin_collection_your_address
    options:
      offset:
        hours: 5
        minutes: 0
        seconds: 0
        days: 0
      offset_type: before
  - trigger: calendar.event_started
    target:
      entity_id: calendar.bin_collection_your_address
    options:
      offset:
        hours: 4
        minutes: 0
        seconds: 0
        days: 0
      offset_type: before
  - trigger: calendar.event_started
    target:
      entity_id: calendar.bin_collection_your_address
    options:
      offset:
        hours: 7
        minutes: 30
        seconds: 0
        days: 0
      offset_type: after
conditions:
  - condition: state
    entity_id: sensor.doorbell_camera_bin_day_classification
    state:
      - No Bin
actions:
  - action: input_boolean.turn_on
    metadata: {}
    target:
      entity_id: input_boolean.looking_for_bin
    data: {}
  - action: notify.mobile_app_your_phone_here
    metadata: {}
    data:
      title: Bin Day
      message: >
        The {{ state_attr('calendar.bin_collection_your_address', 'message') | lower }}
        is collected {% if now().hour < 12 %}today{% else %}tomorrow{% endif %}.
        I can't see the bin. Is it out?
mode: single
